# MD Stats 配置文件（由设置 GUI 生成，也可手动编辑）
# 修改后点击主窗口的「设置 → 确定」即时生效。
# 所有时间单位为秒，所有颜色使用十六进制格式。

# 图像识别相关配置
[detection]
# 截图间隔（秒），推荐 0.3 ~ 1.0
interval = 0.3
# 匹配置信度阈值 (0.0~1.0)，推荐 0.75~0.90
confidence_threshold = 0.8

[window]
# 主窗口宽度（像素）
width = 1300
# 主窗口高度（像素）
height = 700

# 界面外观
[appearance]
# 主题文件夹名（内置: "dark" / "light" / "macaron"）
theme = "macaron"

# 对方卡组预设
[opponent_decks]
# 记录表格下拉菜单的预设选项
presets = ["闪刀姬", "烙印", "白银城", "k9vs"]

# 数据存储
[recorder]
# 是否按日期分文件存储 CSV
daily_files = false

# 剪贴板复制行为
[clipboard]
# 竖排模式：true = 每行"key\tvalue"，false = 横排 TSV
vertical_layout = true
# 复制范围："current" = 当前卡组，"all" = 全部卡组
scope = "all"
# 要复制的列名列表（空 = 默认 8 项）
columns = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]

# 悬浮统计窗
[floating_window]
# 是否使用主题背景图（false = 纯色，方便 OBS 颜色键捕捉）
use_theme_bg = false
# 悬浮窗宽度（像素）
width = 250
# 悬浮窗高度（像素）
height = 300
# 背景色
bg_color = "#bdef0a"
# 不透明度 0-100
opacity = 50
# 文字字号（像素）
font_size = 20
# 文字颜色
text_color = "#000000"
# 字体（Qt 从前往后找第一个可用的）
font_family = "Microsoft YaHei, -apple-system, sans-serif"
# 显示数据行（空 = 默认 8 项）
rows = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]
