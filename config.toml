# ==============================================================================
# MD Stats 配置文件
# ==============================================================================
# 本文件使用 TOML 格式 (Tom's Obvious, Minimal Language)。
# 修改任意配置项后，重新启动程序即可生效。
# 所有时间单位均为秒，所有颜色使用十六进制格式。

# ------------------------------------------------------------------------------
# [detection] — 图像识别相关配置
# ------------------------------------------------------------------------------
[detection]
# 截图间隔时间（秒），即每隔多久截取一次游戏画面进行识别。
# 值越小识别越灵敏，但对 CPU 的占用也越高。
# 推荐范围: 0.3 ~ 1.0
interval = 0.3

# 模板匹配置信度阈值 (0.0 ~ 1.0)。
# 只有匹配度 ≥ 此阈值时，才认为"识别成功"。
# - 阈值过高 (如 0.95): 可能频繁漏识别
# - 阈值过低 (如 0.5):  可能产生误识别
# 推荐范围: 0.75 ~ 0.90
confidence_threshold = 0.8

# ------------------------------------------------------------------------------
# [window] — 主窗口尺寸
# ------------------------------------------------------------------------------
[window]
# 主窗口宽度（像素）
width = 1101
# 主窗口高度（像素）
height = 700

# ------------------------------------------------------------------------------
# [appearance] — 界面外观
# ------------------------------------------------------------------------------
[appearance]
# 界面主题 — 填写 themes/ 目录下的主题文件夹名
# 内置主题: "dark"（暗色沉浸）、"light"（亮色清爽）、"macaron"（马卡龙水彩）
# 自定义主题: 在 themes/ 下新建文件夹，放入 theme.toml + assets/，然后在此填写文件夹名
# 详见 themes/README.md
theme = "macaron"

# ------------------------------------------------------------------------------
# [opponent_decks] — 对方卡组预设（记录表格中通过下拉菜单选择）
# ------------------------------------------------------------------------------
[opponent_decks]
# 预设的对方卡组名称列表，可在 GUI 中通过下拉菜单快速选择，也支持手动输入。
# 示例: presets = ["炎兽", "闪刀姬", "烙印", "白银城"]
presets = ["炎兽", "闪刀姬", "烙印", "白银城"]

# ------------------------------------------------------------------------------
# [recorder] — 数据存储配置
# ------------------------------------------------------------------------------
[recorder]
# 是否启用按日期分文件存储。
# false: 所有对战数据保存在 csv/data.csv 中（默认）。
# true:  每天生成独立文件 csv/data-YYYY-MM-DD.csv，启动时自动创建。
daily_files = false
