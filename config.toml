# ==============================================================================
# MD Stats 配置文件
# ==============================================================================
# 本文件使用 TOML 格式 (Tom's Obvious, Minimal Language)。
# 修改任意配置项后，重新启动程序即可生效。
# 所有时间单位均为秒，所有颜色使用十六进制格式。

# ------------------------------------------------------------------------------
# [detection] — 图像识别相关配置
# ------------------------------------------------------------------------------
[detection]
# 截图间隔时间（秒），即每隔多久截取一次游戏画面进行识别。
# 值越小识别越灵敏，但对 CPU 的占用也越高。
# 推荐范围: 0.3 ~ 1.0
interval = 0.3

# 模板匹配置信度阈值 (0.0 ~ 1.0)。
# 只有匹配度 ≥ 此阈值时，才认为"识别成功"。
# - 阈值过高 (如 0.95): 可能频繁漏识别
# - 阈值过低 (如 0.5):  可能产生误识别
# 推荐范围: 0.75 ~ 0.90
confidence_threshold = 0.8

# ------------------------------------------------------------------------------
# [window] — 主窗口尺寸
# ------------------------------------------------------------------------------
[window]
# 主窗口宽度（像素）
width = 1300
# 主窗口高度（像素）
height = 700

# ------------------------------------------------------------------------------
# [appearance] — 界面外观
# ------------------------------------------------------------------------------
[appearance]
# 界面主题 — 填写 themes/ 目录下的主题文件夹名
# 内置主题: "dark"（暗色沉浸）、"light"（亮色清爽）、"macaron"（马卡龙水彩）
# 自定义主题: 在 themes/ 下新建文件夹，放入 theme.toml + assets/，然后在此填写文件夹名
# 详见 themes/README.md
theme = "macaron"

# ------------------------------------------------------------------------------
# [opponent_decks] — 对方卡组预设（记录表格中通过下拉菜单选择）
# ------------------------------------------------------------------------------
[opponent_decks]
# 预设的对方卡组名称列表，可在 GUI 中通过下拉菜单快速选择，也支持手动输入。
# 示例: presets = ["炎兽", "闪刀姬", "烙印", "白银城"]
presets = ["炎兽", "闪刀姬", "烙印", "白银城"]

# ------------------------------------------------------------------------------
# [recorder] — 数据存储配置
# ------------------------------------------------------------------------------
[recorder]
# 是否启用按日期分文件存储。
# false: 所有对战数据保存在 csv/data.csv 中（默认）。
# true:  每天生成独立文件 csv/data-YYYY-MM-DD.csv，启动时自动创建。
daily_files = false

# ------------------------------------------------------------------------------
# [clipboard] — 剪贴板复制行为
# ------------------------------------------------------------------------------
[clipboard]
# 竖排模式：true = 每行"key\tvalue"格式，false = 横排 TSV 表格
vertical_layout = true

# 复制范围："current" = 仅当前输入的卡组，"all" = 全部卡组 + 合计行
scope = "all"

# 要复制的列（空列表 = 同悬浮窗默认 8 项）
# 可选值：卡组、对局数、胜/负、赢/输硬币、胜率、赢硬币概率、赢硬币胜率、输硬币胜率、
#         先攻次数、后攻次数、先攻胜、后攻胜、先攻胜率、后攻胜率、胜、负、赢硬币次数、输硬币次数
# "胜/负" 和 "赢/输硬币" 以合并格式（如"10 / 5"）显示
columns = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]

# ------------------------------------------------------------------------------
# [floating_window] — 悬浮统计窗
# ------------------------------------------------------------------------------
[floating_window]
# 窗口尺寸（像素）
width = 250
height = 300
# 是否使用主题背景图（主题设了 float_bg 时生效）
# false = 强制纯色模式（方便 OBS 颜色键捕捉，用 bg_color 做绿幕）
# true  = 优先主题背景图，图不存在时回退纯色
use_theme_bg = false

# 背景色（十六进制 RGB） — use_theme_bg=false 时使用此纯色
bg_color = "#BDEF0A"
# 不透明度 0-100（0=全透明, 50=半透明, 100=不透明）
opacity = 50
# 文字字号（像素）
font_size = 20
# 文字颜色
text_color = "#000000"
# 字体（空则用全局字体）
font_family = "Microsoft YaHei"
# 悬浮窗显示的数据行（空列表 = 使用默认 8 行）
# 可选值：卡组、对局数、胜/负、赢/输硬币、赢币概率、赢币胜率、输币胜率、
#         综合胜率、胜率、先攻次数、后攻次数、先攻胜、后攻胜、先攻胜率、后攻胜率
# "胜/负" 和 "赢/输硬币" 以合并格式（如"10 / 5"）显示
rows =  ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]
