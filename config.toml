# MD Stats 配置文件（由设置 GUI 生成，也可手动编辑）
# 修改后点击主窗口的「设置 → 确定」即时生效。
# 所有时间单位为秒，所有颜色使用十六进制格式。

# 图像识别相关配置
[detection]
# 截图间隔（秒），推荐 0.3 ~ 1.0
interval = 0.3
# 匹配置信度阈值 (0.0~1.0)，推荐 0.75~0.90
confidence_threshold = 0.8

# 调试与实验功能
[debug]
# 检测到关键事件时保存截图到 screenshots/
save_screenshots = false
# 下一局开始时自动清除上一局的截图
auto_clear_screenshots = false
# 启用截图热键（全局热键，游戏全屏时也可用）
hotkey_enabled = false
# 单次截图热键
snapshot_hotkey = "Ctrl+Shift+S"
# 周期截图热键（按一下开始，再按停止）
periodic_hotkey = "Ctrl+Shift+D"
# 周期截图间隔（秒）
periodic_interval = 0.5
# 开启日志模式：将运行信息写入 logs/ 目录
log_mode = false
# 日志记录范围："status"=状态栏消息, "screenshots"=截图事件, "errors"=错误信息
log_scope = ["status", "screenshots", "errors"]
# 状态栏显示检测置信度（段位图标 NCC、等级判读、三阶段检测分数）
show_confidence = false
# 识别失败时诊断截图（匹配度接近阈值但未达标时自动截图 + 诊断数据）
save_failure_samples = false
# 偏移量（值越大越容易触发，0 = 仅保存未达标的最高分）
failure_sample_offset = 0.2

[window]
# 主窗口宽度（像素）
width = 1300
# 主窗口高度（像素）
height = 700

# 界面外观
[appearance]
# 主题文件夹名（内置: "dark" / "light" / "macaron"）
theme = "macaron"

# 对方卡组预设
[opponent_decks]
# 记录表格下拉菜单的预设选项
presets = ["闪刀姬", "烙印", "k9vs", "杀手旋律", "绚岚", "烙印星宿", "纠罪巧"]

# 数据存储
[recorder]
# 是否按日期分文件存储 CSV
daily_files = false
# 启动时自动填入最近一次使用的卡组（从 CSV 读取）
remember_last_deck = true

# 统计表格显示
[stats]
# 统计表格显示的列名列表（空 = 全部显示）
columns = ["卡组", "对局数", "胜", "负", "胜率", "赢硬币次数", "输硬币次数", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "先攻次数", "后攻次数", "先攻胜", "后攻胜", "先攻胜率", "后攻胜率"]

# 剪贴板复制行为
[clipboard]
# 竖排模式：true = 每行"key\tvalue"，false = 横排 TSV
vertical_layout = true
# 复制范围："current" = 当前卡组，"all" = 全部卡组
scope = "all"
# 要复制的列名列表（空 = 默认 8 项）
columns = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]

# 系统通知
[notification]
# 对局结束时弹出系统气泡通知
enabled = true
# 通知显示持续时间（秒）
duration = 1
# 最小化时隐藏到系统托盘（而非任务栏）
minimize_to_tray = false

# 段位图标检测
[rank_detection]
# 是否启用段位图标检测
enabled = true
# 截图间隔（秒），0.3 ~ 1.0
interval = 0.3
# 匹配置信度阈值 (0.0~1.0)
confidence_threshold = 0.7

# 悬浮统计窗
[floating_window]
# 是否使用主题背景图（false = 纯色，方便 OBS 颜色键捕捉）
use_theme_bg = false
# 在悬浮窗底部显示当前的检测状态（硬币/先后攻/胜负分数）
show_status = false
# 悬浮窗宽度（像素）
width = 250
# 悬浮窗高度（像素）
height = 330
# 背景色
bg_color = "#bdef0a"
# 不透明度 0-100
opacity = 50
# 文字字号（像素）
font_size = 20
# 文字颜色
text_color = "#000000"
# 字体（Qt 从前往后找第一个可用的，含 macOS/Windows 回退）
font_family = "Microsoft YaHei UI"
# 显示数据行（空 = 默认 8 项）
rows = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]
