# ==============================================================================
# 马卡龙主题 — 低饱和度、高明度的梦幻粉彩色调
# ==============================================================================

[meta]
# 主题显示名称（用于 UI 中展示）
name = "马卡龙"


# ==============================================================================
# 标题栏 — 自定义标题栏外观
#   height         : 标题栏总高度（像素）
#   icon_size      : 左侧程序图标的显示尺寸（像素）
#   text_color     : 标题文字颜色（十六进制 RGB）
#   text_size      : 标题文字字号（像素）
#   btn_hover_bg   : 最小化按钮悬停时的背景色
#   btn_close_hover: 关闭按钮悬停时的背景色（通常用红色系）
# ==============================================================================
[titlebar]
height = 40
icon_size = 22
text_color = "#9b6b8e"
text_size = 16
# Marker Felt（mac）/ Bradley Hand / Chalkboard SE — 手写但端正、可读，
# 没有 Snell Roundhand 那种花体；Windows 上回退到 Comic Sans MS / 楷体。
text_font = '"Marker Felt", "Bradley Hand", "Chalkboard SE", "Comic Sans MS", "楷体", "KaiTi", "STKaiti", "Microsoft YaHei"'
text_shadow = "#fce4ec"
btn_hover_bg = "#fce4ec"
btn_close_hover = "#f0a5b5"


# ==============================================================================
# 资源 — 字体和背景图片
#
#   字体：
#     font_family : QSS 中引用的字体名（没有 [[assets.fonts]] 时从系统查找）
#     font_size   : 全局默认字号
#
#     [[assets.fonts]] — 自定义字体文件（可选，可重复多条）
#       file   : assets/ 下的 TTF 文件名
#       family : 加载后的字体族名（QSS 中引用此名称）
#
#   背景图片：
#     [assets.images] — 全部可选，不填 file 则回退到 [colors] 中的纯色
#       file : assets/ 下的文件名
#       mode : stretch（拉伸填充）/ tile（平铺）/ center（居中）
#
#     ┌─────────────────┬───────────┬──────┬─────────┬──────────────────────────┐
#     │ 配置项            │ 建议尺寸    │ 透明  │ 模式     │ 用途说明                   │
#     ├─────────────────┼───────────┼──────┼─────────┼──────────────────────────┤
#     │ main_bg         │ 1100×700  │ 否   │ stretch │ 主窗口全幅背景              │
#     │ panel_bg        │ 1100×50   │ 否   │ stretch │ 顶部控制栏 + 底部按钮栏       │
#     │ table_bg        │ 1080×480  │ 否   │ stretch │ 两张表格所在区域              │
#     │ header_bg       │ 1080×32   │ 否   │ stretch │ 表格列标题栏                 │
#     │ statusbar_bg    │ 1100×30   │ 否   │ stretch │ 底部状态栏                   │
#     │ button_texture  │ 32×32     │ 否   │ tile    │ 按钮表面纹理（细微噪点/磨砂感）  │
#     └─────────────────┴───────────┴──────┴─────────┴──────────────────────────┘
# ==============================================================================
[assets]
# 可爱字体栈 — Qt 按顺序找第一个可用字体，缺字符再回退到下一个
#   macOS 头三个最有手写感：HanziPen SC（毛笔）/ Hannotate SC（中性手写） / Yuppy SC（圆体）
#   Chalkboard SE / Comic Sans MS — 英文/数字的圆体替代
#   Windows: 华文琥珀（厚墩墩可爱）/ 华文新魏（毛笔感）/ 楷体（兜底毛笔风）/ Microsoft YaHei（最终保底）
# 同一栈在两个系统都奏效，不存在的字体被 Qt 自动跳过
font_family = '"Yuppy SC", "Hannotate SC", "HanziPen SC", "Chalkboard SE", "Comic Sans MS", "华文琥珀", "STHupo", "华文新魏", "STXinwei", "KaiTi", "楷体", "Microsoft YaHei", "PingFang SC"'
font_size   = 14

[[assets.fonts]]
# file = "NotoSansSC-Regular.ttf"
# family = "Noto Sans SC"

[assets.images]
main_bg      = { file = "main_bg.png", mode = "stretch" }
panel_bg     = { file = "panel_bg.png", mode = "stretch" }
table_bg     = { file = "table_bg.png", mode = "stretch" }
header_bg    = { file = "header_bg.png", mode = "stretch" }
button_bg    = { file = "button_texture.png", mode = "tile" }
statusbar_bg = { file = "statusbar_bg .png", mode = "stretch" }


# ==============================================================================
# 颜色表 — 下方所有值既用于 style.qss 中的 {{color.xxx}} 占位符替换，
# 也被 Python 代码调用 _theme_colors() 获取，用于动态按钮着色。
#
# 格式: 十六进制 RGB，如 "#fdf6f0"。必须带引号。
# ==============================================================================

[colors]

# --------------------------------------------------------------------------
# 背景层次 — 奶油质感淡米色 + 浅粉辅色，构成甜美的空间感
#   main_bg      : 窗口/主区域底色
#   widget_bg    : 卡片、输入框、按钮、表格主体等控件的背景色
#   alt_row_bg   : 表格交替行背景（比 widget_bg 略亮/略暗以区分行）
#   statusbar_bg : 底部状态栏背景
# --------------------------------------------------------------------------
main_bg       = "#fdf6f0"
widget_bg     = "#ffffff"
alt_row_bg    = "#fdf2f8"
statusbar_bg  = "#f5e6f0"

# --------------------------------------------------------------------------
# 文字颜色 — 柔和的紫灰色，避免纯黑刺眼
#   text_primary   : 正文、标签、按钮文字
#   text_secondary : 辅助说明、表头文字、状态栏消息
#   text_disabled  : 禁用状态的文字（按钮、输入框等）
#   table_text     : 统计表格和记录表格的文字
# --------------------------------------------------------------------------
text_primary   = "#7a6b7e"
text_secondary = "#b8a9be"
text_disabled  = "#d5ccd8"
table_text     = "#7a6b7e"

# --------------------------------------------------------------------------
# 边框颜色 — 浅粉为主，香芋紫为强调
#   border          : 默认边框（按钮、输入框、表格网格线）
#   border_hover    : 鼠标悬停时的边框
#   border_focus    : 输入框/控件获得焦点时的边框（通常是强调色）
#   border_disabled : 禁用状态的边框
# --------------------------------------------------------------------------
border          = "#f0e0ec"
border_hover    = "#e8b4d0"
border_focus    = "#d4a0c0"
border_disabled = "#f5eef4"

# --------------------------------------------------------------------------
# 交互状态 — 按钮 hover/pressed、表格行选中
#   hover_bg     : 鼠标悬停时控件的背景色
#   pressed_bg   : 按钮按下时的背景色（应比 hover_bg 略深）
#   selection_bg : 表格选中行、ComboBox 下拉选中项的背景色
# --------------------------------------------------------------------------
hover_bg     = "#fef0f5"
pressed_bg   = "#fce4ec"
selection_bg = "#fce4f0"

# --------------------------------------------------------------------------
# 语义色 — 用于手动按钮的动态变色（背景色随对局阶段切换）
#   win        : 手动按钮阶段 2 左按钮（胜）的背景色
#   lose       : 手动按钮阶段 2 右按钮（负）的背景色
#   coin       : 手动按钮阶段 0（赢硬币 / 输硬币）的背景色
#   turn       : 手动按钮阶段 1（先攻 / 后攻）的背景色
#   start_bg   : "启动" 按钮的背景色
#   warning_bg : "终止等待" 按钮的背景色
#   muted_bg   : 弱化/辅助按钮的背景色
# --------------------------------------------------------------------------
win         = "#98d4bb"
lose        = "#f0a5b5"
coin        = "#f5d5a0"
turn        = "#a8c8f0"
start_bg    = "#98d4bb"
warning_bg  = "#f5d5a0"
muted_bg    = "#d5ccd8"

# --------------------------------------------------------------------------
# 分割器 — QSplitter 的拖拽手柄
#   splitter       : 默认颜色
#   splitter_hover : 鼠标悬停时颜色（通常用强调色）
# --------------------------------------------------------------------------
splitter        = "#f0e0ec"
splitter_hover  = "#d4a0c0"

# --------------------------------------------------------------------------
# 表头强调线 — 表格表头（QHeaderView）底部的 2px 装饰线
# --------------------------------------------------------------------------
header_accent   = "#e8b4d0"

# --------------------------------------------------------------------------
# 下拉框 — QComboBox 及弹出列表
# --------------------------------------------------------------------------
combo_bg     = "#ffffff"
combo_border = "#f0e0ec"

# --------------------------------------------------------------------------
# 弹窗 — QMessageBox 对话框
# --------------------------------------------------------------------------
msgbox_bg = "#fdf6f0"
