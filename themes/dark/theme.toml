# ==============================================================================
# 暗色沉浸主题
# ==============================================================================

[meta]
# 主题显示名称（用于 UI 中展示）
name = "暗色沉浸"


# ==============================================================================
# 标题栏 — 自定义标题栏外观
#   height         : 标题栏总高度（像素）
#   icon_size      : 左侧程序图标的显示尺寸（像素）
#   text_color     : 标题文字颜色（十六进制 RGB）
#   text_size      : 标题文字字号（像素）
#   btn_hover_bg   : 最小化按钮悬停时的背景色
#   btn_close_hover: 关闭按钮悬停时的背景色（通常用红色系）
# ==============================================================================
[titlebar]
height = 36
icon_size = 20
text_color = "#b8b8c8"
text_size = 12
btn_hover_bg = "#3a3a5a"
btn_close_hover = "#e74c3c"


# ==============================================================================
# 资源 — 字体和背景图片
#
#   字体：
#     font_family : QSS 中引用的字体名（没有 [[assets.fonts]] 时从系统查找）
#     font_size   : 全局默认字号
#
#     [[assets.fonts]] — 自定义字体文件（可选，可重复多条）
#       file   : assets/ 下的 TTF 文件名
#       family : 加载后的字体族名（QSS 中引用此名称）
#
#   背景图片：
#     [assets.images] — 全部可选，不填 file 则回退到 [colors] 中的纯色
#       file : assets/ 下的文件名
#       mode : stretch（拉伸填充）/ tile（平铺）/ center（居中）
#
#     ┌─────────────────┬───────────┬──────┬─────────┬──────────────────────────┐
#     │ 配置项           │ 建议尺寸    │ 透明  │ 模式    │ 用途说明                   │
#     ├─────────────────┼───────────┼──────┼─────────┼──────────────────────────┤
#     │ main_bg         │ 1100×700  │ 否   │ stretch │ 主窗口全幅背景              │
#     │ panel_bg        │ 1100×50   │ 否   │ stretch │ 顶部控制栏 + 底部按钮栏      │
#     │ table_bg        │ 1080×480  │ 否   │ stretch │ 两张表格所在区域            │
#     │ header_bg       │ 1080×32   │ 否   │ stretch │ 表格列标题栏                │
#     │ statusbar_bg    │ 1100×30   │ 否   │ stretch │ 底部状态栏                 │
#     │ button_texture  │ 32×32     │ 否   │ tile    │ 按钮表面纹理（细微噪点/磨砂感）│
#     └─────────────────┴───────────┴──────┴─────────┴──────────────────────────┘
# ==============================================================================
[assets]
font_family = "Microsoft YaHei"
font_size   = 13

[[assets.fonts]]
# file = "NotoSansSC-Regular.ttf"
# family = "Noto Sans SC"

[assets.images]
main_bg      = { file = "", mode = "stretch" }
panel_bg     = { file = "", mode = "stretch" }
table_bg     = { file = "", mode = "stretch" }
header_bg    = { file = "", mode = "tile" }
button_bg    = { file = "", mode = "tile" }
statusbar_bg = { file = "", mode = "stretch" }


# ==============================================================================
# 颜色表 — 下方所有值既用于 style.qss 中的 {{color.xxx}} 占位符替换，
# 也被 Python 代码调用 _theme_colors() 获取，用于动态按钮着色。
#
# 格式: 十六进制 RGB，如 "#1a1a2e"。必须带引号。
# ==============================================================================

[colors]

# --------------------------------------------------------------------------
# 背景层次 — 从深到浅，构成界面的空间感
#   main_bg      : 窗口/主区域底色
#   widget_bg    : 卡片、输入框、按钮、表格主体等控件的背景色
#   alt_row_bg   : 表格交替行背景（比 widget_bg 略亮/略暗以区分行）
#   statusbar_bg : 底部状态栏背景
# --------------------------------------------------------------------------
main_bg       = "#1a1a2e"
widget_bg     = "#16213e"
alt_row_bg    = "#1a1e3a"
statusbar_bg  = "#141428"

# --------------------------------------------------------------------------
# 文字颜色
#   text_primary   : 正文、标签、按钮文字
#   text_secondary : 辅助说明、表头文字、状态栏消息
#   text_disabled  : 禁用状态的文字（按钮、输入框等）
#   table_text     : 统计表格和记录表格的文字
# --------------------------------------------------------------------------
text_primary   = "#b8b8c8"
text_secondary = "#8b8b9e"
text_disabled  = "#555568"
table_text     = "#b8b8c8"

# --------------------------------------------------------------------------
# 边框颜色
#   border          : 默认边框（按钮、输入框、表格网格线）
#   border_hover    : 鼠标悬停时的边框
#   border_focus    : 输入框/控件获得焦点时的边框（通常是强调色）
#   border_disabled : 禁用状态的边框
# --------------------------------------------------------------------------
border          = "#2a2a4a"
border_hover    = "#3a3a5a"
border_focus    = "#e2a03f"
border_disabled = "#1e1e36"

# --------------------------------------------------------------------------
# 交互状态 — 按钮 hover/pressed、表格行选中
#   hover_bg     : 鼠标悬停时控件的背景色
#   pressed_bg   : 按钮按下时的背景色（应比 hover_bg 略深）
#   selection_bg : 表格选中行、ComboBox 下拉选中项的背景色
# --------------------------------------------------------------------------
hover_bg     = "#1f3060"
pressed_bg   = "#152040"
selection_bg = "#1f3060"

# --------------------------------------------------------------------------
# 语义色 — 用于手动按钮的动态变色（背景色随对局阶段切换）
#   win        : 手动按钮阶段 2 左按钮（胜）的背景色
#   lose       : 手动按钮阶段 2 右按钮（负）的背景色
#   coin       : 手动按钮阶段 0（赢硬币 / 输硬币）的背景色
#   turn       : 手动按钮阶段 1（先攻 / 后攻）的背景色
#   start_bg   : "启动" 按钮的背景色
#   warning_bg : "终止等待" 按钮的背景色
#   muted_bg   : 弱化/辅助按钮的背景色
# --------------------------------------------------------------------------
win         = "#2ecc71"
lose        = "#e74c3c"
coin        = "#e2a03f"
turn        = "#3498db"
start_bg    = "#2ecc71"
warning_bg  = "#e2a03f"
muted_bg    = "#555568"

# --------------------------------------------------------------------------
# 分割器 — QSplitter 的拖拽手柄
#   splitter       : 默认颜色
#   splitter_hover : 鼠标悬停时颜色（通常用强调色）
# --------------------------------------------------------------------------
splitter        = "#2a2a4a"
splitter_hover  = "#e2a03f"

# --------------------------------------------------------------------------
# 表头强调线 — 表格表头（QHeaderView）底部的 2px 装饰线
# --------------------------------------------------------------------------
header_accent   = "#e2a03f"

# --------------------------------------------------------------------------
# 下拉框 — QComboBox 及弹出列表
# --------------------------------------------------------------------------
combo_bg     = "#16213e"
combo_border = "#2a2a4a"

# --------------------------------------------------------------------------
# 弹窗 — QMessageBox 对话框
# --------------------------------------------------------------------------
msgbox_bg = "#1a1a2e"
