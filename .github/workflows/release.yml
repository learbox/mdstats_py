name: Release

on:
  push:
    tags:
      - 'v*.*.*'          # 推送 v1.4.0 这类 tag 时触发
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write          # 允许创建 Release

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv（含 Python 3.12）
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: 同步依赖（按 uv.lock 精确复现）
        run: uv sync --frozen

      - name: 编译 .ui 文件
        run: uv run pyside6-uic ui/main_window.ui -o ui/main_window_ui.py

      - name: PyInstaller 打包（内联 spec，自动排除未用 Qt 模块和多语翻译）
        shell: pwsh
        run: |
          @'
          # -*- mode: python ; coding: utf-8 -*-

          _UNUSED_QT_DLLS = [
              'qt6quick', 'qt6qml', 'qt6pdf', 'qt6svg',
              'qt6virtualkeyboard', 'qt6network',
              'qt63d', 'qt6opengl', 'opengl32sw',
              'qt6webchannel', 'qt6webengine', 'qt6websockets',
              'qt6bluetooth', 'qt6nfc', 'qt6serialport',
              'qt6multimedia', 'qt6sensors', 'qt6positioning',
              'qt6printsupport', 'qt6help', 'qt6sql', 'qt6test',
              'qt6concurrent', 'qt6dbus',
              'qt6designer', 'qt6axcontainer',
          ]

          import os as _os, glob as _glob, shutil as _sh
          import PySide6
          _pydir = _os.path.dirname(PySide6.__file__)
          _icu_src = _os.path.join(_pydir, 'resources', 'icudtl.dat')
          # 只收集中文翻译（qt_zh_CN.qm 是聚合文件，需要子模块 *_zh_CN.qm 才能加载）
          _tl_tmp = '_tmp_translations'
          _os.makedirs(_tl_tmp, exist_ok=True)
          for _f in _glob.glob(_os.path.join(_pydir, 'translations/*zh_CN*')):
              _sh.copy(_f, _tl_tmp)
          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[(_tl_tmp, 'PySide6/translations')] +
                  ([(_icu_src, 'resources')] if _os.path.exists(_icu_src) else []),
              hiddenimports=['PySide6.QtXml'],  # Qt 翻译解析 .qm 文件需要
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          a.binaries = [
              (name, path, typ) for name, path, typ in a.binaries
              if not any(kw in name.lower() for kw in _UNUSED_QT_DLLS)
          ]
          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name='MD Stats',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=False,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon=['app_icon.ico'],
              contents_directory='.runtime',
          )
          coll = COLLECT(
              exe,
              a.binaries,
              a.datas,
              strip=False,
              upx=False,
              upx_exclude=[],
              name='MD Stats',
          )

          '@ | Set-Content "MD Stats.spec" -Encoding UTF8

          uv run --with 'pyinstaller>=6.10,<7' pyinstaller "MD Stats.spec" --noconfirm

      - name: 组装发布目录
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $tag = $env:TAG
          $release = "dist/release"
          New-Item -ItemType Directory -Path $release -Force | Out-Null
          Copy-Item "dist/MD Stats/MD Stats.exe" $release
          Copy-Item -Recurse "dist/MD Stats/.runtime" $release
          Copy-Item -Recurse themes $release
          Copy-Item -Recurse csv $release
          Copy-Item -Recurse resource $release
          Copy-Item config.toml $release
          Copy-Item .app_state.toml $release
          Copy-Item docs/README_release.md "$release/README.md"
          Copy-Item docs/TROUBLESHOOTING.md $release
          Copy-Item LICENSE $release
          Get-ChildItem -Path $release -Recurse -Include __pycache__ -Force | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $release -Recurse -Filter *.pyc -Force | Remove-Item -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "$release/*" -DestinationPath "dist/MD Stats-$tag.zip" -CompressionLevel Optimal

      - name: 上传 ZIP 为构建产物（非 tag 时在此下载）
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: MD Stats-${{ github.ref_name }}
          path: dist/MD Stats-${{ github.ref_name }}.zip

      - name: 创建 GitHub Release（草稿，仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MD Stats-${{ github.ref_name }}.zip
          name: MD Stats ${{ github.ref_name }}
          draft: true
